<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceImageOfTheDay | Search</title>
    <link
      rel="shortcut icon"
      href="../images/astronaut_white.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="./js/search.js"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
      <h1>Search By Day</h1>
      <form action="" method="get">
        <div class="form">
          <label for="date">Date:</label>
          <input type="date" name="date" id="date" />
        </div>
        <button type="submit">Find Image of Date</button>
      </form>
      <div id="hero"></div>
      <div class="loading hidden">
        <p class="spinner"></p>
        Loading! If it is taking to long to load try refreshing the page or
        choose a different date.
      </div>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
